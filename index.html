<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <title>Login</title>
    <link rel="stylesheet" href="./style.css" />
    <link rel="stylesheet" href="./styles/colors.css" />
    <link rel="stylesheet" href="./styles/login.css" />
  </head>

  <body class="body-login">
    <header class="header-login">
      <img class="join-logo" src="./assets/img/logo-join-dark.svg" alt="page-1Logo" />
      <nav class="nav-login">
        <p class="span-nav-login">Not a Join user?</p>
        <button class="btn btn--primary" id="sign_up">Sign up</button>
      </nav>
    </header>

    <main class="main-login">
      <article class="login-content">
        <form class="form-login" id="form_login">
          <h1 class="h1-login">Log in</h1>
          <section>
            <input class="login-email-input" type="email" name="email" placeholder="Email" required />
            <img src="./assets/img/icons/input/mail.svg" alt="letter icon" class="input input--icon" />
          </section>

          <section>
            <input class="login-email-input" type="email" name="email" placeholder="Password" required />
            <img src="./assets/img/icons/input/lock.svg" alt="lock icon" class="input input--icon" />
          </section>

          <button type="submit" class="btn btn--primary">Log in</button>
          <button type="submit" class="btn btn--secondary">Guest Log in</button>
        </form>
      </article>
    </main>
    <footer class="footer-login">
      <div class="footer-content">
        <span class="span-footer">Privacy Policy</span>
        <span class="span-footer">Legal notice</span>
      </div>
    </footer>
  </body>
</html>
