<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./assets/img/favicon/favicon-join.svg" />
    <title>Login</title>
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../styles/fonts.css" />
    <link rel="stylesheet" href="../styles/colors.css" />
    <link rel="stylesheet" href="../styles/login.css" />

    <script src="./scripts/login.js"></script>
  </head>

  <body onload="init()">
    <header class="header">
      <img class="join-logo" src="./assets/img/logo-join-dark.svg" alt="page-1Logo" />
      <nav class="nav-login" id="nav_login">
        <p class="span-nav-login">Not a Join user?</p>
        <button id="signup_btn" class="btn btn--primary btn--signup">Sign up</button>
      </nav>
    </header>

    <main class="main-login">
      <form class="form--container login" id="login">
        <section class="form--title">
          <h1>Log in</h1>
        </section>

        <section class="input--container">
          <div class="input--section">
            <input class="input" id="email" type="email" name="email" placeholder="Email" autocomplete="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Bitte gib eine gültige E-Mail-Adresse ein (z.B. max@mustermann.de)" required />
            <img src="./assets/img/icons/input/mail.svg" alt="letter icon" class="input--icon" />
          </div>

          <div class="input--section">
            <input class="input" type="password" name="password" placeholder="Password" required />
            <img src="./assets/img/icons/input/lock.svg" alt="lock icon" class="input--icon" />
          </div>
        </section>

        <!-- pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Muss mindestens eine Zahl, einen Groß- und einen Kleinbuchstaben enthalten und mindestens 8 Zeichen lang sein" // add to password -->

        <section class="login-buttons">
          <button type="submit" class="btn btn--primary btn--login">Log in</button>
          <button type="button" class="btn btn--secondary btn--login" id="guest_login">Guest Log in</button>
        </section>
      </form>

      <form class="form--container signup dnone" id="signup">
        <section class="form--title">
          <button class="btn btn--arrow" id="signup_back"><img class="arrowBackToLogin" src="../assets/img/icons/general/Vector.svg" alt="zurück zum login" /></button>
          <h1>Sign Up</h1>
        </section>
        <div class="input--container-wrapper">
          <section class="input--container">
            <div class="input--section">
              <input class="input input_signup" id="name" type="text" name="name" placeholder="Name" autocomplete="Name" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Bitte gib einen Namen ein (z.B. Max Mustermann)" required />
              <img src="../assets/img/icons/input/person.svg" alt="letter icon" class="input--icon" />
            </div>

            <div class="input--section">
              <input class="input input_signup" id="email" type="email" name="email" placeholder="Email" autocomplete="email" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Bitte gib eine gültige E-Mail-Adresse ein (z.B. max@mustermann.de)" required />
              <img src="../assets/img/icons/input/mail.svg" alt="letter icon" class="input--icon" />
            </div>

            <div class="input--section">
              <input class="input input_signup" type="password" name="password" placeholder="Password" required />
              <img src="../assets/img/icons/input/lock.svg" alt="lock icon" class="input--icon" />
            </div>

            <!-- pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Muss mindestens eine Zahl, einen Groß- und einen Kleinbuchstaben enthalten und mindestens 8 Zeichen lang sein"  // für das password -->

            <div class="input--section">
              <input class="input input_signup" type="password" name="password" placeholder="Confirm Password" required />
              <img src="../assets/img/icons/input/lock.svg" alt="lock icon" class="input--icon" />
            </div>
          </section>
          <!-- pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}" title="Muss mindestens eine Zahl, einen Groß- und einen Kleinbuchstaben enthalten und mindestens 8 Zeichen lang sein" // für das password -->
          <div class="privacy-content">
            <input class="input_signup" type="checkbox" id="privacy" name="privacy" required />
            <span> I accept the </span>
            <a href="./html/privacyPolicy.html" class="acceptPrivacyPolicy" s>Privacy policy</a>
          </div>
        </div>
        <button type="submit" class="btn btn--primary btn--signup">Sign up</button>
      </form>
    </main>
    <footer class="footer-login">
      <div class="footer-content">
        <a href="privacyPolicy.html">
          <p>Privacy Policy</p>
        </a>
        <a href="./html/legalNotice.html">
          <p>Legal notice</p>
        </a>
      </div>
    </footer>
  </body>
</html>
