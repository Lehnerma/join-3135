<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="../assets/img/favicon/favicon-join.svg" />
  <title>Sign Up</title>
  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../styles/fonts.css">
  <link rel="stylesheet" href="../styles/colors.css" />
  <link rel="stylesheet" href="../styles/signUp.css" />
</head>

<body>
  <header class="header">

    <nav class="nav-signUp">
      <img class="join-logo" src="../assets/img/logo-join-dark.svg" alt="signUp-Logo" />
    </nav>

  </header>

  <main>
    <article class="signUp-content">
      <form id="" onsubmit="" return false; class="form-signUp" id="form_login">
       
        <div class="form--title">
         <h1 class="h1-signUp">Sign Up</h1> 
         <a href="../index.html"><img class="arrowBackToLogin" src="../assets/img/icons/general/Vector.svg" alt="pfeil zurück zum login"></a>
        </div>
         
        <section class="input--section">
          <input class="input" id="name" type="name" name="Name" placeholder="Name" autocomplete="Name"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Bitte gib einen Namen ein (z.B. Max Mustermann)"
            required />
          <img src="../assets/img/icons/input/person.svg" alt="letter icon" class="input--icon" />
        </section>

        <section class="input--section">
          <input class="input" id="email" type="email" name="Email" placeholder="Email" autocomplete="email"
            pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$"
            title="Bitte gib eine gültige E-Mail-Adresse ein (z.B. max@mustermann.de)" required />
          <img src="../assets/img/icons/input/mail.svg" alt="letter icon" class="input--icon" />
        </section>

        <section class="input--section">
          <input class="input" type="password" name="Password" placeholder="Password"
            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
            title="Muss mindestens eine Zahl, einen Groß- und einen Kleinbuchstaben enthalten und mindestens 8 Zeichen lang sein"
            required />
          <img src="../assets/img/icons/input/lock.svg" alt="lock icon" class="input--icon" />
        </section>

        <section class="input--section">
          <input class="input" type="password" name="Confirm Password" placeholder="Confirm Password"
            pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
            title="Muss mindestens eine Zahl, einen Groß- und einen Kleinbuchstaben enthalten und mindestens 8 Zeichen lang sein"
            required />
          <img src="../assets/img/icons/input/lock.svg" alt="lock icon" class="input--icon" />
        </section>

        <section class="privacy-content">
          <input type="checkbox" id="privacy" required><span >
            I accept the <span></span><a href="privacyPolicy.html" target="_blank" class="acceptPrivacyPolicy"s >Privacy policy</a>
        </section>

        <section class="login-buttons">
          <button type="submit" class="btn btn--primary">Sign up</button>
        </section>

      </form>
    </article>
  </main>
  <footer class="footer-login">
    <div class="footer-content">
      <a href="privacyPolicy.html" target="_blank">
        <p>Privacy Policy</p>
      </a>
      <a href="legalNotice.html" target="_blank">
        <p>Legal notice</p>
      </a>
    </div>
  </footer>
</body>

</html>
