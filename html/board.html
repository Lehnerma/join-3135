<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join - Board</title>

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../styles/sidebar.css" />
    <link rel="stylesheet" href="../styles/fonts.css" />
    <link rel="stylesheet" href="../styles/colors.css" />
    <link rel="stylesheet" href="../styles/board.css" />
</head>

<body class="app">

    <header class="app--title">
        <h1 class="app--title-headline">Kanban Project Management Tool</h1>
        <div class="app--icons">
            <a href="#"><img src="../assets/img/icons/general/help.svg" alt="?" class="app--icon" /></a>
            <img src="../assets/img/user_initials.svg" alt="M L" class="app--initials" />
        </div>
    </header>

    <nav class="sidebar">
        <img class="nav-logo" src="../assets/img/logo-join.svg" alt="Join-logo">
        <ul>
            <li class="">
                <a class="nav-category" href="summary.html"><img class="nav-category-img"
                        src="../assets/img/icons/general/summary.svg" alt="" />Summary</a>
            </li>
            <li class="">
                <a class="nav-category" href="addTaskPage.html"><img class="nav-category-img"
                        src="../assets/img/icons/general/add-task.svg" alt="" />Add Task</a>
            </li>
            <li class="">
                <a class="nav-category" href="board.html"><img class="nav-category-img"
                        src="../assets/img/icons/general/board.svg" alt="" />Board</a>
            </li>
            <li class="">
                <a class="nav-category" href="contacts.html"><img class="nav-category-img"
                        src="../assets/img/icons/general/contacts.svg" alt="" />Contacts</a>
            </li>
        </ul>
        <div class="legal-section">
            <a class="legal-section-link" href="#">Privacy Policy</a>
            <a class="legal-section-link" href="#">Legal Notice</a>
        </div>
    </nav>

    <main class="app--content">

        <section class="board-header-section">
            <div class="board-title-container">
                <h1>Board</h1>
                <div class="board-actions">
                    <input type="text" id="search-task" placeholder="Find Task">
                    <button class="btn-dark">Add task +</button>
                </div>
            </div>
        </section>

        <section class="kanban-columns">

            <!-- TO DO -->
            <div class="kanban-column">
                <div class="column-title">
                    <span>To do</span>
                </div>
                <div class="task-list" id="todo-list"></div>
            </div>

            <!-- IN PROGRESS -->
            <div class="kanban-column">
                <div class="column-title">
                    <span>In progress</span>
                </div>
                <div class="task-list" id="inprogress-list"></div>
            </div>

            <!-- FEEDBACK -->
            <div class="kanban-column">
                <div class="column-title">
                    <span>Await feedback</span>
                </div>
                <div class="task-list" id="feedback-list"></div>
            </div>

            <!-- DONE -->
            <div class="kanban-column">
                <div class="column-title">
                    <span>Done</span>
                </div>
                <div class="task-list" id="done-list"></div>
            </div>

        </section>

    </main>

    <script>
        function loadTasks() {
            return JSON.parse(localStorage.getItem("tasks")) || [];
        }

        function renderBoard() {
            let tasks = loadTasks();

            let todo = document.getElementById("todo-list");
            let inProgress = document.getElementById("inprogress-list");
            let feedback = document.getElementById("feedback-list");
            let done = document.getElementById("done-list");

            todo.innerHTML = "";
            inProgress.innerHTML = "";
            feedback.innerHTML = "";
            done.innerHTML = "";

            for (let i = 0; i < tasks.length; i++) {
                let task = tasks[i];

                let card = `
            <div class="task-card">
                <div class="category-label">${task.category}</div>
                <div class="task-title">${task.title}</div>
                <div class="task-description">${task.description}</div>

                <div class="task-footer">
                    <span>${task.priority}</span>
                </div>
            </div>
        `;

                if (task.status === "todo") {
                    todo.innerHTML += card;
                }

                if (task.status === "inProgress") {
                    inProgress.innerHTML += card;
                }

                if (task.status === "feedback") {
                    feedback.innerHTML += card;
                }

                if (task.status === "done") {
                    done.innerHTML += card;
                }
            }
        }

        renderBoard();
    </script>

</body>

</html>
