<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join - Board</title>

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../styles/sidebar.css" />
    <link rel="stylesheet" href="../styles/fonts.css" />
    <link rel="stylesheet" href="../styles/colors.css" />
    <link rel="stylesheet" href="../styles/board.css" />
</head>

<body class="app">
    <header class="app--title">
        <h1 class="app--title-headline">Kanban Project Management Tool</h1>
        <div class="app--icons">
            <a href="#"><img src="../assets/img/icons/general/help.svg" alt="?" class="app--icon" /></a>
            <img src="../assets/img/user_initials.svg" alt="M L" class="app--initials" />
        </div>
    </header>

    <nav class="sidebar">
        <img class="nav-logo" src="../assets/img/logo-join.svg" alt="join_logo" />
        <ul>
            <li>
                <a class="nav-category" href="summary.html"><img class="nav-category-img"
                        src="../assets/img/icons/general/summary.svg" alt="" />Summary</a>
            </li>
            <li>
                <a class="nav-category" href="addTask.html"><img class="nav-category-img"
                        src="../assets/img/icons/general/add-task.svg" alt="" />Add Task</a>
            </li>
            <li class="active">
                <a class="nav-category" href="board.html"><img class="nav-category-img"
                        src="../assets/img/icons/general/board.svg" alt="" />Board</a>
            </li>
            <li>
                <a class="nav-category" href="contacts.html"><img class="nav-category-img"
                        src="../assets/img/icons/general/contacts.svg" alt="" />Contacts</a>
            </li>
        </ul>

        <div class="legal-section">
            <a class="legal-section-link" href="#">Privacy Policy</a>
            <a class="legal-section-link" href="#">Legal Notice</a>
        </div>
    </nav>

    <main class="app--content">
        <!-- Board Header mit Suche und Add Task Button -->
        <section class="board-header-section">
            <div class="board-title-container">
                <h1>Board</h1>
                <div class="board-actions">
                    <div class="search-container">
                        <input type="text" id="search-task" placeholder="Find Task">
                        <div class="search-divider"></div>
                        <img src="../assets/img/icons/general/search.svg" alt="search">
                    </div>
                    <button class="btn-dark">Add task +</button>
                </div>
            </div>
        </section>

        <!-- Die vier Kanban Spalten -->
        <section class="kanban-columns">
            <!-- Spalte: TO DO -->
            <div class="kanban-column">
                <div class="column-title">
                    <span>To do</span>
                    <img src="../assets/img/icons/general/plus-button.svg" alt="plus">
                </div>
                <div class="task-list" id="todo-list">
                    <!-- Beispiel-Karte -->
                    <div class="task-card">
                        <div class="category-label user-story">User Story</div>
                        <div class="task-title">Contact Form & Imprint</div>
                        <div class="task-description">Create a contact form and imprint page...</div>
                        <div class="subtask-progress">
                            <div class="progress-bar-bg">
                                <div class="progress-bar-fill" style="width: 0%"></div>
                            </div>
                            <span>0/2 Subtasks</span>
                        </div>
                        <div class="task-footer">
                            <div class="assignees">
                                <div class="initials-circle orange">AN</div>
                                <div class="initials-circle turquoise">EM</div>
                                <div class="initials-circle purple">MB</div>
                            </div>
                            <img class="prio-icon" src="../assets/img/icons/prio/urgent.svg" alt="urgent">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Weitere Spalten (werden analog aufgebaut) -->
            <div class="kanban-column">
                <div class="column-title"><span>In progress</span><img src="../assets/img/icons/general/plus-button.svg"
                        alt="+"></div>
            </div>
            <div class="kanban-column">
                <div class="column-title"><span>Await feedback</span><img
                        src="../assets/img/icons/general/plus-button.svg" alt="+"></div>
            </div>
            <div class="kanban-column">
                <div class="column-title"><span>Done</span></div>
            </div>
        </section>
    </main>
</body>

</html>
