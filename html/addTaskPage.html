<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="/styles/addTaskPage.css">

    <style>
        .mainAddTaskField {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .addTaskField {
            display: flex;
            justify-content: center;
            gap: 40px;
        }

        .addTaskField>div:last-child {
            border-left: 2px solid #ccc;
            padding-left: 40px;
        }

        .frame29 {
            width: 400px;
            height: 376px;
        }

        .titleAddTask {
            width: 100%;
            height: 30px;
            border-radius: 12px;
        }

        .descriptionAddTask {
            width: 100%;
            height: 100px;
            border-radius: 12px;
        }

        .Frame211 {
            width: 100%;
            height: 30px;
            border-radius: 12px;
        }

        .frame39 {
            width: 400px;
            height: 376px;
        }

        .frame28 {
            width: 400px;
            height: 40px;
            background-color: royalblue;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            
        }


        .priorityBtn {
            width: 80px;
            height: 30px;
            margin: 0 10px;
            border-radius: 12px;
            background-color: rgb(198, 196, 192);
            border: none;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="mainField">


        <div class="sidebar">
            <div class="logo">Logo</div>
            <a href="#">Summary</a>
            <a href="#">Add Task</a>
            <a href="#">Board</a>
            <a href="#">Contacts</a>
        </div>


        <div class="mainAddTaskField">
            <h1>Add Task</h1>
            <div class="addTaskField">

                <div action="/addTask" method="post" class="frame29">
                    <div>
                        <!-- <label for="taskName">Title:</label> -->

                        <p>Title:</p>
                        <input type="text" id="taskName" name="taskName" required class="titleAddTask"
                            placeholder="Enter a title"><br><br>
                    </div>

                    <div>
                        <!-- <label for="taskDescription">Description:</label> -->
                        <p>Description:</p>
                        <textarea id="taskDescription" name="   " required class="descriptionAddTask"
                            placeholder="Enter a description"></textarea><br><br>

                    </div>


                    <label for="Date">Date:</label>
                    <input type="date" id="Date" name="Date" required class="Frame211"><br><br>




                </div>

                <div action="" class="frame39">

                    <p>Priority:</p>
                    <div class="frame28">
                        <button class="priorityBtn" onclick="urgent()">Urgent</button>
                        <button class="priorityBtn" onclick="medium()">Medium</button>
                        <button class="priorityBtn" onclick="low()">Low</button>

                    </div>



                    <p>Assigned to:</p>
                    <select id="assigned" name="assigned" required>
                        <option value="">--Select a person--</option>
                        <option value="alice">Alice</option>
                        <option value="bob">Bob</option>
                        <option value="carol">Carol</option>
                        <option value="dave">Dave</option>
                    </select><br><br>

                    <p>Category:</p>
                    <select id="category" name="category" required>
                        <option value="">--Select task category--</option>
                        <option value="Technical_Task">Technical Task</option>
                        <option value="User_Story">User Story</option>
                    </select><br><br>


                    <p> </p>
                    <input type="text" id="subtask1" name="subtask1" placeholder="Subtask 1"><br><br>





                    <div>
                        <button onclick="clearTask()">Clear Task</button>
                        <button onclick="addTask()">Create Task</button>

                    </div>

                </div>





            </div>



        </div>

    </div>

</body>

</html>
