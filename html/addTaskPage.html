<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join - Add Task</title>

    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../styles/sidebar.css" />
    <link rel="stylesheet" href="../styles/fonts.css" />
    <link rel="stylesheet" href="../styles/colors.css" />
    <link rel="stylesheet" href="../styles/addTaskPage.css" />
  </head>

  <body class="app">
    <header class="app--title">
      <h1 class="app--title-headline">Kanban Project Management Tool</h1>
      <img src="../assets/img/logo-join-dark.svg" alt="join logo" class="title-logo" />
      <div class="app--icons">
        <a href="./help.html"><img src="../assets/img/icons/general/help.svg" alt="help" class="app--icon" /></a>
        <button id="user-menu-button" class="btn btn--user">ML</button>
      </div>
    </header>

    <nav class="sidebar">
      <img class="nav-logo" src="../assets/img/logo-join.svg" alt="join_logo" />
      <ul>
        <li class="">
          <a class="nav-category" href="summary.html"><img class="nav-category-img" src="../assets/img/icons/general/summary.svg" alt="" />Summary</a>
        </li>
        <li class="">
          <a class="nav-category" href="addTaskPage.html"><img class="nav-category-img" src="../assets/img/icons/general/add-task.svg" alt="" />Add Task</a>
        </li>
        <li class="">
          <a class="nav-category" href="board.html"><img class="nav-category-img" src="../assets/img/icons/general/board.svg" alt="" />Board</a>
        </li>
        <li class="">
          <a class="nav-category" href="contacts.html"><img class="nav-category-img" src="../assets/img/icons/general/contacts.svg" alt="" />Contacts</a>
        </li>
      </ul>

      <div class="legal-section">
        <a class="legal-section-link" href="#">Privacy Policy</a>
        <a class="legal-section-link" href="#">Legal Notice</a>
      </div>
    </nav>

    <main class="app--content">
      <article class="board-title-container">
        <h1>Add Task</h1>

        <form class="task-form" onsubmit="createTask(event)">
          <div class="form-columns">
            <!-- Linke Spalte -->
            <div class="column">
              <label>Title<span>*</span></label>
              <input id="title" type="text" placeholder="Enter a title" />

              <label>Description</label>
              <textarea id="description" placeholder="Enter a Description"></textarea>

              <label>Due date<span>*</span></label>
              <input id="dueDate" type="date" />
            </div>

            <div class="divider"></div>

            <!-- Rechte Spalte -->
            <div class="column">
              <label>Priority</label>

              <div class="priority-group">
                <button type="button" id="btn-urgent" class="prio-btn" onclick="selectPriority('urgent')">Urgent</button>

                <button type="button" id="btn-medium" class="prio-btn" onclick="selectPriority('medium')">Medium</button>

                <button type="button" id="btn-low" class="prio-btn" onclick="selectPriority('low')">Low</button>
              </div>

              <label>Assigned to</label>
              <select id="assignedTo">
                <option value="" selected>Select contacts to assign</option>
              </select>

              <label>Category<span>*</span></label>
              <select id="category">
                <option value="Technical Task">Technical Task</option>
                <option value="User Story">User Story</option>
              </select>

              <label>Subtasks</label>
              <div class="subtask-input">
                <input id="subtaskInput" type="text" placeholder="Add subtask" />

                <span class="subtask-icons">
                  <span onclick="addSubtask()">✓</span>
                  <span onclick="clearSubtaskInput()">✕</span>
                </span>
              </div>

              <div id="subtaskList"></div>
            </div>
          </div>

          <div class="form-footer">
            <p><span>*</span>This field is required</p>

            <div class="action-buttons">
              <button type="reset" class="btn-clear">Clear ✕</button>
              <button type="submit" class="btn-create">Create Task ✓</button>
            </div>
          </div>
        </form>
      </article>
    </main>

    <div id="toast" class="toast">Task added to board ✅</div>

    <script></script>
  </body>
</html>
