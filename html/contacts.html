<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="shortcut icon" href="../assets/img/favicon/favicon-join.svg" type="image/x-icon" />
  <title>Contacts</title>

  <link rel="stylesheet" href="../style.css" />
  <link rel="stylesheet" href="../styles/sidebar.css" />
  <link rel="stylesheet" href="../styles/contacts.css" />

  <link rel="stylesheet" href="../styles/fonts.css" />
  <link rel="stylesheet" href="../styles/colors.css" />
  <script defer src="../scripts/contacts.js"></script>
</head>

  <body class="app" onload="init()">
    <header class="app--title">
      <h1 class="app--title-headline">Kanban Project Management Tool</h1>
      <div class="app--icons">
        <a href="./help.html"><img src="../assets/img/icons/general/help.svg" alt="?" class="app--icon" /></a>
        <img src="../assets/img/user_initials.svg" alt="M L" class="app--initials" />
      </div>
    </header>
    <nav class="sidebar">
      <img class="nav-logo" src="../assets/img/logo-join.svg" alt="join_logo" />
      <ul>
        <li class="">
          <a class="nav-category" href="#"><img class="nav-category-img" src="../assets/img/icons/general/summary.svg" alt="" />Summary</a>
        </li>
        <li class="">
          <a class="nav-category" href="#"><img class="nav-category-img" src="../assets/img/icons/general/add-task.svg" alt="" />Add Task</a>
        </li>
        <li class="">
          <a class="nav-category" href="#"><img class="nav-category-img" src="../assets/img/icons/general/board.svg" alt="" />Board</a>
        </li>
        <li class="active">
          <a class="nav-category" href="#"><img class="nav-category-img" src="../assets/img/icons/general/contacts.svg" alt="" />Contacts</a>
        </li>
      </ul>

    <div class="legal-section">
      <a class="legal-section-link" href="../html/privacyPolicy.html">Privacy Policy</a>
      <a class="legal-section-link" href="../html/legalNotice.html">Legal Notice</a>
    </div>
  </nav>

  <main class="main-content">

    <div class="left-content">

      <button type="button" class="btn btn--primary add-button-size" onclick="openOverlayContact()">
        Add new contact
        <img class="add-contact-icon" src="../assets/img/icons/general/person_add.svg" alt="add contact button">
      </button>
      <div class="contact-list">
        <div id="contactList" class="contact-data">Radek</div>
      </div>
    </div>

    <div class="right-content">
      <div class="headline">
        <h1 class="contacts-title">Contacts</h1>
        <div class="vertical-divider"></div>
        <span class="contacts-subtitle">Better with a team</span>
        <div id="contactDetails" class="contact-details">Hier kommen die Datails</div>
      </div>

  </main>

 <dialog class="dialog-content" id="addNewContact">
   
    <aside class="aside-content">
        <img class="aside-logo" src="../assets/img/logo-join.svg" alt="logo-join" />
        <section>
            <h2>Add contact</h2>
            <p>Tasks are better with a team!</p>
            <div class="blue-line-horizontal"></div>
        </section>
    </aside>

  
    <div class="form-section-wrapper">
        <button type="button" id="close-btn" class="close-btn-overlay" onclick="document.getElementById('addNewContact').close()">x</button>
        
        <div class="form-body">
           
            <div class="profile-badge-container">
                <img src="../assets/img/icons/input/person.svg" alt="Profile" class="large-profile-icon">
            </div>

            
            <form class="form--container login" id="login">
                <section class="input--container">
                    <div class="input--section">
                        <input class="input" type="text" name="name" placeholder="Name" required />
                        <img src="../assets/img/icons/input/person.svg" alt="icon" class="input--icon" />
                    </div>

                    <div class="input--section">
                        <input class="input" id="email" type="email" name="email" placeholder="Email" required />
                        <img src="../assets/img/icons/input/mail.svg" alt="icon" class="input--icon" />
                    </div>

                    <div class="input--section">
                        <input class="input" type="tel" name="phone" placeholder="Phone" required />
                        <img src="../assets/img/icons/input/phone.svg" alt="icon" class="input--icon" />
                    </div>
                </section>

                <section class="login-buttons">
                    <button type="button" class="btn btn--secondary"  onclick="document.getElementById('addNewContact').close()">Cancel <span class="cancel-x">x</span></button>
                    <button type="submit" class="btn btn--primary">Create contact</button>
                </section>
            </form>
        </div>
    </div>
</dialog>
  </dialog>




</body>

</html>
